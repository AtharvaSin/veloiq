services:
  postgres:
    image: postgres:16-alpine
    container_name: veloiq-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veloiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veloiq_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-veloiq}
    ports:
      # Host 5432 occupied by another project on this machine; VeloIQ uses 5434.
      - "5434:5432"
    volumes:
      - veloiq_postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veloiq} -d ${POSTGRES_DB:-veloiq}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veloiq-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-veloiq}:${POSTGRES_PASSWORD:-veloiq_dev_password}@postgres:5432/${POSTGRES_DB:-veloiq}
      TEST_DATABASE_URL: postgresql://${POSTGRES_USER:-veloiq}:${POSTGRES_PASSWORD:-veloiq_dev_password}@postgres:5432/${POSTGRES_DB:-veloiq}_test
      API_V1_PREFIX: /api/v1
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      FAKER_SEED: "42"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veloiq-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  veloiq_postgres_data:
